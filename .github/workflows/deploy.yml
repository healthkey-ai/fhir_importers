name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Block two deploys from racing; queue serially.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  GCP_REGION: us-central1
  AR_REPO: healthkey-fhir-backend
  IMAGE_NAME: app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — typecheck + build the federated remote
        working-directory: frontend
        run: |
          npm ci
          npx tsc -b
          npm run build:remote

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Backend — install + run pytest
        run: |
          pip install -U pip wheel
          pip install -r requirements-dev.txt
          python -m pytest

  docker_build:
    name: Build & push image to Artifact Registry
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Auth to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          # GOOGLE_CLOUD_PROJECT is auto-exported by google-github-actions/auth.
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/${AR_REPO}/${IMAGE_NAME}"
          echo "Building ${IMAGE_URI}:${GITHUB_SHA}"
          docker build --platform linux/amd64 --provenance=false \
            -t "${IMAGE_URI}:${GITHUB_SHA}" \
            -t "${IMAGE_URI}:latest" \
            .
          docker push "${IMAGE_URI}:${GITHUB_SHA}"
          docker push "${IMAGE_URI}:latest"

  deploy:
    name: Deploy
    needs: [docker_build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # The docker-compose.yml lives on the host (managed out-of-band, in
      # DEPLOY_PATH). It should reference the AR image like:
      #   image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/healthkey-fhir-backend/app:${IMAGE_TAG:-latest}
      # so the IMAGE_TAG exported below pins the rev being rolled out.
      - name: Pull image + restart on host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GCP_KEY_FILE: ${{ secrets.GCP_KEY_FILE }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" <<EOF
            set -e
            cd $DEPLOY_PATH
            gcloud auth activate-service-account --key-file=$GCP_KEY_FILE
            gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet
            export IMAGE_TAG=${GITHUB_SHA}
            echo "Rolling out IMAGE_TAG=\$IMAGE_TAG"
            docker compose pull
            docker compose run --rm migrate
            docker compose up -d --remove-orphans
            docker compose ps
          EOF

  smoke:
    name: Smoke
    needs: [deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            curl -fsS https://healthkey-fhir-backend.cancerbot.org/health && exit 0
            sleep 2
          done
          echo "App didn't become ready in 60s"
          exit 1

      - name: Smoke (remoteEntry.js + /epic/organizations)
        run: make smoke
