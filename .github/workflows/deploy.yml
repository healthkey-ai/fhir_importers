name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Block two deploys from racing; queue serially.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: Typecheck + smoke import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — typecheck + build the federated remote
        working-directory: frontend
        run: |
          npm ci
          npx tsc -b
          npm run build:remote

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Backend — install + import-smoke the FastAPI app
        run: |
          pip install -U pip wheel
          pip install -r requirements.txt
          # Settings fields default to empty; the StaticFiles mount is skipped
          # when the bundle dir is absent — so importing the app should succeed
          # on a clean runner with no real config.
          python -c "from app.main import app; print('routes:', sorted({r.path for r in app.routes}))"

  deploy:
    name: Deploy to ${{ secrets.SSH_HOST }}
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # Mirrors `make deploy`: rsync the working tree (sans dev cruft) and
      # then docker-compose up --build on the host. The multi-stage Dockerfile
      # builds both the federation remote (Node stage) and the FastAPI runtime
      # (Python stage), so no separate frontend artifact needs shipping.
      - name: rsync source to host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='venv/' \
            --exclude='frontend/node_modules/' \
            --exclude='frontend/dist/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.idea/' \
            --exclude='*.tsbuildinfo' \
            --exclude='examples/' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Rebuild + restart on host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "$SSH_USER@$SSH_HOST" <<EOF
            set -e
            cd $DEPLOY_PATH
            docker compose up -d --build
            docker compose ps
          EOF
