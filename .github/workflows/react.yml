name: frontend

on:
  push:
    branches: [ dev, main, v2 ]
  pull_request:

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up node
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        # cache: 'npm'
    - name: Set test env
      run: cp .env_test .env
    - name: Cache node_modules
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: ui/node_modules
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node_modules-
    - name: Install dependencies
      # if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: make install_frontend
    - name: Debug list of modules
      run: ls -l ui/node_modules

  deploy_dev:
    runs-on: ubuntu-latest
    needs: [prepare]
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Restore node_modules from cache
        uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}
      - name: Set test env
        run: cp ui/.env.development ui/.env
      - name: Set Sentry env
        env:
            SENTRY_DSN: ${{ secrets.FRONTEND_SENTRY_DSN }}
        run: |
            echo "SENTRY_DSN=${SENTRY_DSN}" >> ui/.env
            echo "SENTRY_ENVIRONMENT=dev" >> ui/.env
            echo "SENTRY_RELEASE=$(git rev-parse HEAD)" >> ui/.env
            echo "VITE_MIXPANEL_TOKEN=${{ secrets.MIXPANEL_TOKEN }}" >> ui/.env
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> ui/.env
      - name: Debug modules
        run: ls -l ui/node_modules
      - name: Run Build
        run: source ui/.env && export && make build_frontend_dev
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy to staging
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} echo ok
          rsync -avz --delete ./build/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/data/cancerbot-frontend-staging/
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

  deploy_prod:
    runs-on: ubuntu-latest
    needs: [prepare]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Restore node_modules from cache
        uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}
      - name: Set test env
        run: cp ui/.env.production ui/.env
      - name: Set Sentry env
        env:
          SENTRY_DSN: ${{ secrets.FRONTEND_SENTRY_DSN }}
        run: |
          echo "SENTRY_DSN=${SENTRY_DSN}" >> ui/.env
          echo "SENTRY_ENVIRONMENT=production" >> ui/.env
          echo "SENTRY_RELEASE=$(git rev-parse HEAD)" >> ui/.env
          echo "VITE_MIXPANEL_TOKEN=${{ secrets.MIXPANEL_TOKEN }}" >> ui/.env
          echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> ui/.env
      - name: Debug modules
        run: ls -l ui/node_modules
      - name: Run Build
        run: source ui/.env && make build_frontend
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy to production
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} echo ok
          rsync -avz --delete ./build/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/data/cancerbot-frontend-prod/
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

  deploy_v2:
    runs-on: ubuntu-latest
    needs: [prepare]
    if: github.ref == 'refs/heads/v2'
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'ui.v2/pnpm-lock.yaml'
      - name: Install dependencies
        run: cd ui.v2 && pnpm install --no-frozen-lockfile
      - name: Set test env
        run: cp ui.v2/.env.v2 ui.v2/.env
      - name: Set Sentry env
        env:
            SENTRY_DSN: ${{ secrets.FRONTEND_SENTRY_DSN }}
        run: |
            echo "SENTRY_DSN=${SENTRY_DSN}" >> ui.v2/.env
            echo "SENTRY_ENVIRONMENT=dev" >> ui.v2/.env
            echo "SENTRY_RELEASE=$(git rev-parse HEAD)" >> ui.v2/.env
            echo "VITE_MIXPANEL_TOKEN=${{ secrets.MIXPANEL_TOKEN }}" >> ui.v2/.env
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> ui.v2/.env
      #- name: Debug modules
      #  run: ls -l ui.v2/node_modules
      - name: Run Build
        run: source ui.v2/.env && export && make build_frontend_v2
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy to v2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} echo ok
          rsync -avz --delete ./build/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/data/cancerbot-frontend-v2/
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
