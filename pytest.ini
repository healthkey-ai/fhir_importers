# pytest.ini — takes precedence over [tool.pytest.ini_options] in pyproject.toml
# when both exist, so ALL pytest config must live here.
[pytest]
asyncio_mode = auto
minversion = 7.0
testpaths = tests
# `-m "not external_api and not llm"` keeps unmarked runs off the wire —
# external_api/llm tests require credentials and cost money/quotas. Opt in
# explicitly: `pytest -m external_api`.
addopts = -ra -q -m "not external_api and not llm"
norecursedirs = pgdata

markers =
    db_fresh: marks tests as initializing DB from scratch, which cannot be run against staging. Incompatible with db_seeded.
    db_seeded: marks tests as assuming DB is pre-seeded with realistic data. Incompatible with db_fresh.
    external_api: marks tests that interact with external APIs. Don't overuse in CI to avoid rate limits.
    llm: marks tests that involve LLM. Don't overuse in CI to avoid costs.
    slow: marks tests as slow
