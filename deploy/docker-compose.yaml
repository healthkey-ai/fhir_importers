x-app-common: &app-common
  image: us-central1-docker.pkg.dev/cancerbot-app/healthkey-fhir-backend/app:${IMAGE_TAG}
  env_file:
    - .env
  networks:
    - healthkey_fhir_backend
  environment:
    # Bare names → pulled from host shell (over `env_file`); `KEY=value` lines override the file.
    - DATABASE_URL
    - TOKEN_ENCRYPTION_KEY
    - FIREBASE_PROJECT_ID
    - CORS_ALLOWED_ORIGINS
    - STAGING_CLIENT_ID
    - STAGING_REDIRECT_URI
    - STAGING_JWKS_KID
    - STAGING_SCOPES
    - PROD_CLIENT_ID
    - PROD_REDIRECT_URI
    - PROD_JWKS_KID
    - PROD_SCOPES
    - REDIS_URL=redis://redis:6379/0
    - FIREBASE_AUTH_EMULATOR_HOST=firebase-auth:9099
    - STAGING_PRIVATE_KEY_PATH=/credentials/epic_staging.key
    - PROD_PRIVATE_KEY_PATH=/credentials/epic_prod.key
  volumes:
    - /data/credentials/epic_staging.key:/credentials/epic_staging.key:ro
    - /data/credentials/epic_prod.key:/credentials/epic_prod.key:ro

services:
  app:
    <<: *app-common
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "0.0.0.0:8030:8000"
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      firebase-auth: { condition: service_started }

  # One-shot. Invoke during deploy with `docker compose run --rm migrate`.
  migrate:
    <<: *app-common
    command: [ "alembic", "upgrade", "head" ]
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  redis:
    image: redis:8.0.2-bookworm
    restart: unless-stopped
    networks:
      - healthkey_fhir_backend
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  firebase-auth:
    image: andreysenov/firebase-tools:latest
    restart: unless-stopped
    networks:
      - healthkey_fhir_backend
    # Loopback-only — the emulator has no auth and mints tokens for any uid.
    ports:
      - "127.0.0.1:9099:9099"
    working_dir: /firebase
    volumes:
      - ./firebase.json:/firebase/firebase.json:ro
    command: [ "firebase", "emulators:start", "--only", "auth", "--project", "demo-ht-phr" ]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - healthkey_fhir_backend
    environment:
      POSTGRES_DB: fhir_importers
      POSTGRES_USER: fhir
      # Only read on first boot to init the data dir; safe to clear from .env after.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - /data/healthkey-fhir-importers-postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fhir -d fhir_importers" ]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  healthkey_fhir_backend:
    name: healthkey_fhir_backend
